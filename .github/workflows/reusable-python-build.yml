name: Reusable Assured Python Build

on:
  workflow_call:
    inputs:
      source_repository:
        required: true
        type: string
      source_commit:
        required: true
        type: string
      source_tree:
        required: true
        type: string
      upstream_repository:
        required: true
        type: string
      upstream_commit:
        required: true
        type: string
      target_repository:
        required: true
        type: string
      project_version:
        required: true
        type: string
      release_tag:
        required: true
        type: string
      case_id:
        required: true
        type: string

permissions:
  contents: read

env:
  BUILDER_IMAGE: ghcr.io/saucetaster/assured-downstream-python-builder
  BUILDER_DIGEST: sha256:fabfecbd48689108af585a49c6c9ee5522bb02aad716fcdc84a8799560ab791b
  HANDOFF_COMMIT: 6db8f2b834f0318e615bfd849e17e9839aaad078

jobs:
  build:
    name: Isolated no-network build and trace
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    permissions:
      contents: read
    outputs:
      source_date_epoch: ${{ steps.source.outputs.source_date_epoch }}
    steps:
      - name: Validate declarative request
        env:
          CALLER_EVENT: ${{ github.event_name }}
          CALLER_OWNER: ${{ github.repository_owner }}
          CALLER_REPOSITORY: ${{ github.repository }}
          CALLER_WORKFLOW_REF: ${{ github.workflow_ref }}
          CALLER_REF_PROTECTED: ${{ github.ref_protected }}
          SOURCE_REPOSITORY: ${{ inputs.source_repository }}
          SOURCE_COMMIT: ${{ inputs.source_commit }}
          SOURCE_TREE: ${{ inputs.source_tree }}
          UPSTREAM_REPOSITORY: ${{ inputs.upstream_repository }}
          UPSTREAM_COMMIT: ${{ inputs.upstream_commit }}
          TARGET_REPOSITORY: ${{ inputs.target_repository }}
          PROJECT_VERSION: ${{ inputs.project_version }}
          RELEASE_TAG: ${{ inputs.release_tag }}
          CASE_ID: ${{ inputs.case_id }}
        run: |
          set -euo pipefail
          test "$CALLER_OWNER" = "SauceTaster"
          test "$CALLER_REPOSITORY" = "SauceTaster/assured-downstream"
          test "$CALLER_WORKFLOW_REF" = "SauceTaster/assured-downstream/.github/workflows/case-study-bandit-build.yml@refs/heads/main"
          test "$CALLER_EVENT" = "workflow_dispatch"
          test "$CALLER_REF_PROTECTED" = "true"
          [[ "$SOURCE_REPOSITORY" =~ ^[A-Za-z0-9_.-]+/[A-Za-z0-9_.-]+$ ]]
          [[ "$UPSTREAM_REPOSITORY" =~ ^[A-Za-z0-9_.-]+/[A-Za-z0-9_.-]+$ ]]
          [[ "$TARGET_REPOSITORY" =~ ^SauceTaster/assured-[A-Za-z0-9_.-]+$ ]]
          [[ "$SOURCE_COMMIT" =~ ^[0-9a-f]{40}$ ]]
          [[ "$SOURCE_TREE" =~ ^[0-9a-f]{40}$ ]]
          [[ "$UPSTREAM_COMMIT" =~ ^[0-9a-f]{40}$ ]]
          [[ "$PROJECT_VERSION" =~ ^[A-Za-z0-9][A-Za-z0-9._+!-]{0,127}$ ]]
          [[ "$RELEASE_TAG" =~ ^[A-Za-z0-9][A-Za-z0-9._+-]{0,127}$ ]]
          [[ "$CASE_ID" =~ ^[A-Za-z0-9][A-Za-z0-9._-]{0,127}$ ]]
          test "$SOURCE_REPOSITORY" = "PyCQA/bandit"
          test "$SOURCE_COMMIT" = "c45446eaa30c4f28289c3b8ba9a955e1d78ba715"
          test "$SOURCE_TREE" = "5313408ad294e5a95f214620ec3064f8e40bc608"
          test "$UPSTREAM_REPOSITORY" = "PyCQA/bandit"
          test "$UPSTREAM_COMMIT" = "c45446eaa30c4f28289c3b8ba9a955e1d78ba715"
          test "$TARGET_REPOSITORY" = "SauceTaster/assured-bandit"
          test "$PROJECT_VERSION" = "1.9.4"
          test "$RELEASE_TAG" = "case-001-bandit-source-canary"
          test "$CASE_ID" = "case-001-bandit-source-canary"

      - name: Checkout immutable handoff verifier
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          repository: SauceTaster/assured-downstream
          ref: 6db8f2b834f0318e615bfd849e17e9839aaad078
          path: assured-control
          persist-credentials: false
          fetch-depth: 1

      - name: Stage immutable handoff verifier
        run: |
          set -euo pipefail
          tool_root="$RUNNER_TEMP/assured-tool/src/assured_downstream"
          install -d -m 0755 "$tool_root"
          cp assured-control/src/assured_downstream/__init__.py "$tool_root/"
          cp assured-control/src/assured_downstream/builder_handoff.py "$tool_root/"
          cp assured-control/src/assured_downstream/catalog.py "$tool_root/"
          cp assured-control/src/assured_downstream/evidence.py "$tool_root/"
          cp assured-control/src/assured_downstream/seed.py "$tool_root/"
          cd "$RUNNER_TEMP/assured-tool"
          printf '%s  %s\n' face06d049a8925de14fabc068bcaf691f92d208e2f9b097fcf43e4697babeb2 src/assured_downstream/__init__.py | sha256sum -c -
          printf '%s  %s\n' eec6f6e7f3e6a0e34d252bc1152c83b8efc8ec988443124ae9ea042f3a094907 src/assured_downstream/builder_handoff.py | sha256sum -c -
          printf '%s  %s\n' 778465cc730f68f0c44e12755dc95adcf78168a1ecedbd5d6fa7aa6c89a5c00a src/assured_downstream/catalog.py | sha256sum -c -
          printf '%s  %s\n' 215c02153b405232a570c3957364dfd84f333b37de56b77e1497a769b953de65 src/assured_downstream/evidence.py | sha256sum -c -
          printf '%s  %s\n' 0fd74a45333689775fa925fdaa44444d465ffd77c710e852eb95e2558bd261a6 src/assured_downstream/seed.py | sha256sum -c -

      - name: Upload immutable handoff verifier
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: assured-python-handoff-tool
          path: ${{ runner.temp }}/assured-tool/
          if-no-files-found: error
          retention-days: 1

      - name: Checkout exact source commit
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          repository: ${{ inputs.source_repository }}
          ref: ${{ inputs.source_commit }}
          path: assured-source
          persist-credentials: false
          fetch-depth: 1

      - name: Verify source commit and tree
        id: source
        env:
          SOURCE_COMMIT: ${{ inputs.source_commit }}
          SOURCE_TREE: ${{ inputs.source_tree }}
        run: |
          set -euo pipefail
          cd "$GITHUB_WORKSPACE/assured-source"
          test "$(git rev-parse HEAD)" = "$SOURCE_COMMIT"
          test "$(git rev-parse 'HEAD^{tree}')" = "$SOURCE_TREE"
          if git config --local --get-regexp '^http\..*\.extraheader$' >/dev/null 2>&1; then
            echo "checkout credentials remain in the source repository" >&2
            exit 1
          fi
          source_date_epoch="$(git show -s --format=%ct HEAD)"
          [[ "$source_date_epoch" =~ ^[0-9]+$ ]]
          printf 'source_date_epoch=%s\n' "$source_date_epoch" >> "$GITHUB_OUTPUT"

      - name: Pull immutable builder image
        run: |
          set -euo pipefail
          docker pull "$BUILDER_IMAGE@$BUILDER_DIGEST"
          docker image inspect "$BUILDER_IMAGE@$BUILDER_DIGEST" >/dev/null

      - name: Run fixed build argv under strace
        env:
          SOURCE_REPOSITORY: ${{ inputs.source_repository }}
          SOURCE_COMMIT: ${{ inputs.source_commit }}
          SOURCE_TREE: ${{ inputs.source_tree }}
          PROJECT_VERSION: ${{ inputs.project_version }}
          SOURCE_DATE_EPOCH: ${{ steps.source.outputs.source_date_epoch }}
        run: |
          set -euo pipefail
          output="$RUNNER_TEMP/assured-build-output"
          sudo install -d -o 65532 -g 65532 -m 0755 "$output"
          timeout --signal=KILL 20m docker run --rm \
            --network none \
            --read-only \
            --cap-drop ALL \
            --security-opt no-new-privileges:true \
            --pids-limit 512 \
            --memory 2g \
            --memory-swap 2g \
            --cpus 2 \
            --user 65532:65532 \
            --ulimit core=0 \
            --ulimit nofile=1024:1024 \
            --ipc none \
            --mount "type=bind,src=$GITHUB_WORKSPACE/assured-source,dst=/input,readonly" \
            --mount "type=bind,src=$output,dst=/out" \
            --tmpfs /workspace:rw,noexec,nosuid,nodev,size=1073741824,uid=65532,gid=65532,mode=0700 \
            --tmpfs /tmp:rw,noexec,nosuid,nodev,size=536870912,uid=65532,gid=65532,mode=0700 \
            --env "ASSURED_SOURCE_REPOSITORY=$SOURCE_REPOSITORY" \
            --env "ASSURED_SOURCE_COMMIT=$SOURCE_COMMIT" \
            --env "ASSURED_SOURCE_TREE=$SOURCE_TREE" \
            --env "ASSURED_PROJECT_VERSION=$PROJECT_VERSION" \
            --env "SOURCE_DATE_EPOCH=$SOURCE_DATE_EPOCH" \
            --env "ASSURED_BUILDER_IMAGE=$BUILDER_IMAGE" \
            --env "ASSURED_BUILDER_IMAGE_DIGEST=$BUILDER_DIGEST" \
            "$BUILDER_IMAGE@$BUILDER_DIGEST"

      - name: Validate isolated builder handoff
        env:
          SOURCE_REPOSITORY: ${{ inputs.source_repository }}
          SOURCE_COMMIT: ${{ inputs.source_commit }}
          SOURCE_TREE: ${{ inputs.source_tree }}
          PROJECT_VERSION: ${{ inputs.project_version }}
        run: |
          set -euo pipefail
          export PYTHONPATH="$RUNNER_TEMP/assured-tool/src"
          python3 -m assured_downstream.builder_handoff validate \
            --root "$RUNNER_TEMP/assured-build-output" \
            --source-repository "$SOURCE_REPOSITORY" \
            --source-commit "$SOURCE_COMMIT" \
            --source-tree "$SOURCE_TREE" \
            --project-version "$PROJECT_VERSION"

      - name: Upload validated build output
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: assured-python-build-output
          path: ${{ runner.temp }}/assured-build-output/
          if-no-files-found: error
          retention-days: 1

  inspect:
    name: Unprivileged artifact inspection and SBOM
    needs: build
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    permissions: {}
    steps:
      - name: Download immutable handoff verifier
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c
        with:
          name: assured-python-handoff-tool
          path: assured-tool

      - name: Verify immutable handoff verifier
        run: |
          set -euo pipefail
          cd assured-tool
          printf '%s  %s\n' face06d049a8925de14fabc068bcaf691f92d208e2f9b097fcf43e4697babeb2 src/assured_downstream/__init__.py | sha256sum -c -
          printf '%s  %s\n' eec6f6e7f3e6a0e34d252bc1152c83b8efc8ec988443124ae9ea042f3a094907 src/assured_downstream/builder_handoff.py | sha256sum -c -
          printf '%s  %s\n' 778465cc730f68f0c44e12755dc95adcf78168a1ecedbd5d6fa7aa6c89a5c00a src/assured_downstream/catalog.py | sha256sum -c -
          printf '%s  %s\n' 215c02153b405232a570c3957364dfd84f333b37de56b77e1497a769b953de65 src/assured_downstream/evidence.py | sha256sum -c -
          printf '%s  %s\n' 0fd74a45333689775fa925fdaa44444d465ffd77c710e852eb95e2558bd261a6 src/assured_downstream/seed.py | sha256sum -c -

      - name: Download validated build output
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c
        with:
          name: assured-python-build-output
          path: assured-evidence

      - name: Revalidate build output boundary
        env:
          SOURCE_REPOSITORY: ${{ inputs.source_repository }}
          SOURCE_COMMIT: ${{ inputs.source_commit }}
          SOURCE_TREE: ${{ inputs.source_tree }}
          PROJECT_VERSION: ${{ inputs.project_version }}
        run: |
          set -euo pipefail
          export PYTHONPATH="$GITHUB_WORKSPACE/assured-tool/src"
          python3 -m assured_downstream.builder_handoff validate \
            --root assured-evidence \
            --source-repository "$SOURCE_REPOSITORY" \
            --source-commit "$SOURCE_COMMIT" \
            --source-tree "$SOURCE_TREE" \
            --project-version "$PROJECT_VERSION"

      - name: Prepare SBOM directory
        run: install -d -m 0755 assured-evidence/sbom

      - name: Generate SPDX SBOM
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610
        with:
          path: assured-evidence/dist
          format: spdx-json
          output-file: assured-evidence/sbom/sbom.spdx.json
          upload-artifact: "false"
          upload-release-assets: "false"

      - name: Bind artifact subjects and build predicate
        env:
          SOURCE_REPOSITORY: ${{ inputs.source_repository }}
          SOURCE_COMMIT: ${{ inputs.source_commit }}
          SOURCE_TREE: ${{ inputs.source_tree }}
          UPSTREAM_REPOSITORY: ${{ inputs.upstream_repository }}
          UPSTREAM_COMMIT: ${{ inputs.upstream_commit }}
          TARGET_REPOSITORY: ${{ inputs.target_repository }}
          PROJECT_VERSION: ${{ inputs.project_version }}
          RELEASE_TAG: ${{ inputs.release_tag }}
          CASE_ID: ${{ inputs.case_id }}
          CALLER_REPOSITORY: ${{ github.repository }}
          CALLER_COMMIT: ${{ github.sha }}
          CALLER_REF: ${{ github.ref }}
          SOURCE_DATE_EPOCH: ${{ needs.build.outputs.source_date_epoch }}
        run: |
          set -euo pipefail
          export PYTHONPATH="$GITHUB_WORKSPACE/assured-tool/src"
          python3 -m assured_downstream.builder_handoff bind-sbom \
            --root assured-evidence
          python3 -m assured_downstream.builder_handoff predicate \
            --root assured-evidence \
            --source-repository "$SOURCE_REPOSITORY" \
            --source-commit "$SOURCE_COMMIT" \
            --source-tree "$SOURCE_TREE" \
            --upstream-repository "$UPSTREAM_REPOSITORY" \
            --upstream-commit "$UPSTREAM_COMMIT" \
            --target-repository "$TARGET_REPOSITORY" \
            --project-version "$PROJECT_VERSION" \
            --release-tag "$RELEASE_TAG" \
            --case-id "$CASE_ID" \
            --caller-repository "$CALLER_REPOSITORY" \
            --caller-commit "$CALLER_COMMIT" \
            --caller-ref "$CALLER_REF" \
            --source-date-epoch "$SOURCE_DATE_EPOCH"
          python3 -m assured_downstream.builder_handoff validate \
            --root assured-evidence \
            --source-repository "$SOURCE_REPOSITORY" \
            --source-commit "$SOURCE_COMMIT" \
            --source-tree "$SOURCE_TREE" \
            --project-version "$PROJECT_VERSION" \
            --require-sbom

      - name: Upload inspected evidence
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: assured-python-inspected-evidence
          path: assured-evidence/
          if-no-files-found: error
          retention-days: 1

  attest:
    name: Keyless attestations and retained evidence
    needs:
      - build
      - inspect
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    permissions:
      attestations: write # Store attestations for the caller repository.
      contents: read
      id-token: write # Request the keyless Sigstore certificate.
    steps:
      - name: Download immutable handoff verifier
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c
        with:
          name: assured-python-handoff-tool
          path: assured-tool

      - name: Verify immutable handoff verifier
        run: |
          set -euo pipefail
          cd assured-tool
          printf '%s  %s\n' face06d049a8925de14fabc068bcaf691f92d208e2f9b097fcf43e4697babeb2 src/assured_downstream/__init__.py | sha256sum -c -
          printf '%s  %s\n' eec6f6e7f3e6a0e34d252bc1152c83b8efc8ec988443124ae9ea042f3a094907 src/assured_downstream/builder_handoff.py | sha256sum -c -
          printf '%s  %s\n' 778465cc730f68f0c44e12755dc95adcf78168a1ecedbd5d6fa7aa6c89a5c00a src/assured_downstream/catalog.py | sha256sum -c -
          printf '%s  %s\n' 215c02153b405232a570c3957364dfd84f333b37de56b77e1497a769b953de65 src/assured_downstream/evidence.py | sha256sum -c -
          printf '%s  %s\n' 0fd74a45333689775fa925fdaa44444d465ffd77c710e852eb95e2558bd261a6 src/assured_downstream/seed.py | sha256sum -c -

      - name: Download inspected evidence
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c
        with:
          name: assured-python-inspected-evidence
          path: assured-evidence

      - name: Validate privileged handoff
        env:
          SOURCE_REPOSITORY: ${{ inputs.source_repository }}
          SOURCE_COMMIT: ${{ inputs.source_commit }}
          SOURCE_TREE: ${{ inputs.source_tree }}
          PROJECT_VERSION: ${{ inputs.project_version }}
        run: |
          set -euo pipefail
          export PYTHONPATH="$GITHUB_WORKSPACE/assured-tool/src"
          python3 -m assured_downstream.builder_handoff validate \
            --root assured-evidence \
            --source-repository "$SOURCE_REPOSITORY" \
            --source-commit "$SOURCE_COMMIT" \
            --source-tree "$SOURCE_TREE" \
            --project-version "$PROJECT_VERSION" \
            --require-sbom

      - name: Attest build provenance
        id: provenance
        uses: actions/attest@a1948c3f048ba23858d222213b7c278aabede763
        with:
          subject-path: assured-evidence/dist/**/*

      - name: Attest SPDX SBOM
        id: sbom
        uses: actions/attest@a1948c3f048ba23858d222213b7c278aabede763
        with:
          subject-path: assured-evidence/dist/**/*
          sbom-path: assured-evidence/sbom/sbom.spdx.json

      - name: Attest Assured Downstream build predicate
        id: build
        uses: actions/attest@a1948c3f048ba23858d222213b7c278aabede763
        with:
          subject-path: assured-evidence/dist/**/*
          predicate-type: https://assured-downstream.dev/attestation/build/v1
          predicate-path: assured-evidence/predicates/build.json

      - name: Retain Sigstore bundles
        env:
          PROVENANCE_BUNDLE: ${{ steps.provenance.outputs.bundle-path }}
          SBOM_BUNDLE: ${{ steps.sbom.outputs.bundle-path }}
          BUILD_BUNDLE: ${{ steps.build.outputs.bundle-path }}
        run: |
          set -euo pipefail
          install -d -m 0755 assured-evidence/attestations
          install -m 0444 "$PROVENANCE_BUNDLE" assured-evidence/attestations/provenance.sigstore.json
          install -m 0444 "$SBOM_BUNDLE" assured-evidence/attestations/sbom.sigstore.json
          install -m 0444 "$BUILD_BUNDLE" assured-evidence/attestations/build.sigstore.json

      - name: Assemble and verify portable evidence
        env:
          SOURCE_REPOSITORY: ${{ inputs.source_repository }}
          SOURCE_COMMIT: ${{ inputs.source_commit }}
          SOURCE_TREE: ${{ inputs.source_tree }}
          UPSTREAM_REPOSITORY: ${{ inputs.upstream_repository }}
          UPSTREAM_COMMIT: ${{ inputs.upstream_commit }}
          TARGET_REPOSITORY: ${{ inputs.target_repository }}
          PROJECT_VERSION: ${{ inputs.project_version }}
          RELEASE_TAG: ${{ inputs.release_tag }}
        run: |
          set -euo pipefail
          export PYTHONPATH="$GITHUB_WORKSPACE/assured-tool/src"
          python3 -m assured_downstream.builder_handoff validate \
            --root assured-evidence \
            --source-repository "$SOURCE_REPOSITORY" \
            --source-commit "$SOURCE_COMMIT" \
            --source-tree "$SOURCE_TREE" \
            --project-version "$PROJECT_VERSION" \
            --require-sbom \
            --require-attestations
          python3 -m assured_downstream.builder_handoff assemble \
            --root assured-evidence \
            --source-repository "$SOURCE_REPOSITORY" \
            --source-commit "$SOURCE_COMMIT" \
            --source-tree "$SOURCE_TREE" \
            --upstream-repository "$UPSTREAM_REPOSITORY" \
            --upstream-commit "$UPSTREAM_COMMIT" \
            --target-repository "$TARGET_REPOSITORY" \
            --project-version "$PROJECT_VERSION" \
            --release-tag "$RELEASE_TAG"

      - name: Upload retained evidence
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: assured-python-retained-evidence
          path: assured-evidence/
          if-no-files-found: error
          retention-days: 30
