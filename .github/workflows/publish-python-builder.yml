name: Publish Assured Python Builder

on:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: publish-python-wheel-v1
  cancel-in-progress: false

jobs:
  publish:
    name: Build, publish, and attest python-wheel-v1
    if: >-
      github.repository == 'SauceTaster/assured-downstream' &&
      github.ref == 'refs/heads/main' &&
      github.ref_protected
    runs-on: ubuntu-24.04
    permissions:
      artifact-metadata: write # Create the OCI attestation storage record.
      attestations: write # Store the GitHub artifact attestation.
      contents: read
      id-token: write # Request the keyless Sigstore certificate.
      packages: write # Push only this repository's reviewed builder image.
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          persist-credentials: false

      - uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f

      - uses: docker/login-action@5e57cd118135c172c3672efd75eb46360885c0ef
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ github.token }}

      - name: Build and push immutable builder
        id: build
        uses: docker/build-push-action@263435318d21b8e681c14492fe198d362a7d2c83
        with:
          context: .
          file: builders/python/Dockerfile
          platforms: linux/amd64
          provenance: mode=max
          pull: true
          push: true
          tags: ghcr.io/saucetaster/assured-downstream-python-builder:bootstrap-${{ github.sha }}
          build-args: |
            VCS_REF=${{ github.sha }}

      - name: Attest published builder image
        uses: actions/attest@a1948c3f048ba23858d222213b7c278aabede763
        with:
          subject-name: ghcr.io/saucetaster/assured-downstream-python-builder
          subject-digest: ${{ steps.build.outputs.digest }}
          push-to-registry: true

      - name: Record immutable image identity
        env:
          IMAGE_DIGEST: ${{ steps.build.outputs.digest }}
        run: |
          test -n "$IMAGE_DIGEST"
          printf '%s\n' "$IMAGE_DIGEST" | tee builder-image-digest.txt

      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: python-wheel-v1-image-identity
          path: builder-image-digest.txt
          if-no-files-found: error
          retention-days: 7
