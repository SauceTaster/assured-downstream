name: Go Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

jobs:
  build:
    name: Build Go
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - name: Build
        run: |
          mkdir -p dist
          go build -trimpath -o dist/go-tool .
      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: go-binary
          path: dist/go-tool
      - name: Publish GitHub release asset
        uses: softprops/action-gh-release@v2
        with:
          files: dist/go-tool
