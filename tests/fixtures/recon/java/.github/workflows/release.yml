name: Java Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven
      - name: Build package
        run: mvn -B -DskipTests package
      - name: Upload jar
        uses: actions/upload-artifact@v4
        with:
          name: java-dist
          path: target/*.jar
      - name: Publish Maven package
        run: mvn -B deploy
