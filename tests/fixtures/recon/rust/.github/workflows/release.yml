name: Rust Release

on:
  pull_request:
  push:
    branches: [main]
    tags:
      - "v*"

permissions: read-all

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Test
        run: cargo test --locked
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build release
        run: |
          cargo build --locked --release
          gh release upload "${{ github.ref_name }}" target/release/rust-tool
